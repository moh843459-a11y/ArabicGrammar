<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Arabic Mastery Quest: Nahw Mir & Hidayatun Nahw Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0c10;
            --bg-gradient: radial-gradient(circle at top right, #161822 0%, #0b0c10 100%);
            --panel-bg: rgba(22, 25, 35, 0.75);
            --panel-border: rgba(255, 255, 255, 0.08);
            --gold-primary: #e5b869;
            --gold-glow: rgba(229, 184, 105, 0.2);
            --text-pure: #ffffff;
            --text-body: #cbd5e1;
            --text-dark: #64748b;
            --sarf-accent: #06b6d4;
            --sarf-glass: rgba(6, 182, 212, 0.08);
            --nahw-accent: #8b5cf6;
            --nahw-glass: rgba(139, 92, 246, 0.08);
            --tarkeeb-accent: #f59e0b;
            --tarkeeb-glass: rgba(245, 158, 11, 0.08);
            --emerald-true: #10b981;
            --emerald-glass: rgba(16, 185, 129, 0.12);
            --rose-true: #f43f5e;
            --rose-glass: rgba(244, 63, 94, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base);
            background: var(--bg-gradient);
            color: var(--text-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .ambient-light-1 {
            position: absolute; width: 450px; height: 450px; background: var(--gold-glow);
            filter: blur(120px); border-radius: 50%; top: -10%; right: -5%; z-index: 0; pointer-events: none;
        }

        .game-wrapper { width: 100%; max-width: 760px; position: relative; z-index: 1; }
        .dashboard-card {
            background: var(--panel-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border); border-radius: 28px; padding: 44px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .header-widget { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .rank-container { display: flex; flex-direction: column; gap: 4px; }
        .rank-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dark); }
        .rank-title { font-size: 1.1rem; font-weight: 700; color: var(--gold-primary); text-shadow: 0 0 12px var(--gold-glow); }
        .metric-badge {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 18px; border-radius: 16px; font-weight: 700; font-size: 0.95rem; color: var(--text-pure);
        }
        .metric-badge span { color: var(--gold-primary); }

        .tracker-timeline { background: rgba(255, 255, 255, 0.04); height: 6px; border-radius: 3px; margin-bottom: 36px; overflow: hidden; }
        .tracker-fill { height: 100%; background: linear-gradient(90deg, var(--gold-primary), #ffd993); width: 0%; transition: width 0.4s ease; }

        .verse-viewport {
            background: rgba(10, 11, 14, 0.5); border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 22px; padding: 36px; text-align: center; margin-bottom: 32px; position: relative;
        }
        .verse-viewport::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold-primary); }
        .arabic-display { font-family: 'Amiri', serif; font-size: 2.6rem; font-weight: 700; line-height: 1.9; direction: rtl; margin-bottom: 16px; color: var(--text-pure); }
        .translation-display { font-size: 1rem; color: var(--text-dark); font-style: italic; }

        .category-tag { align-self: flex-start; display: inline-block; padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 18px; }
        .category-tag.sarf { color: var(--sarf-accent); background: var(--sarf-glass); border: 1px solid rgba(6, 182, 212, 0.2); }
        .category-tag.nahw { color: var(--nahw-accent); background: var(--nahw-glass); border: 1px solid rgba(139, 92, 246, 0.2); }
        .category-tag.tarkeeb { color: var(--tarkeeb-accent); background: var(--tarkeeb-glass); border: 1px solid rgba(245, 158, 11, 0.2); }

        .question-statement { font-size: 1.2rem; font-weight: 600; line-height: 1.5; color: var(--text-pure); margin-bottom: 24px; }
        .options-grid { display: flex; flex-direction: column; gap: 14px; }
        
        .option-node {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 24px; border-radius: 16px; cursor: pointer; font-family: inherit; font-size: 1rem;
            color: var(--text-body); font-weight: 500; text-align: left; transition: all 0.2s ease;
        }
        .option-node:hover:not(:disabled) { background: rgba(255, 255, 255, 0.05); border-color: var(--gold-primary); color: var(--text-pure); transform: translateX(4px); }
        .option-node.node-correct { background: var(--emerald-glass); border-color: var(--emerald-true); color: #a7f3d0; }
        .option-node.node-wrong { background: var(--rose-glass); border-color: var(--rose-true); color: #fecdd3; }

        /* Tarkeeb Specific Drag-and-Drop / Construction Board Layout */
        .tarkeeb-board { display: flex; flex-direction: column; gap: 20px; background: rgba(0, 0, 0, 0.2); padding: 24px; border-radius: 18px; border: 1px dashed rgba(255,255,255,0.1); }
        .tarkeeb-slots { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; direction: rtl; }
        .tarkeeb-slot-card { background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); border-radius: 14px; padding: 12px; min-width: 140px; text-align: center; }
        .word-label { font-family: 'Amiri', serif; font-size: 1.6rem; color: #fff; margin-bottom: 8px; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px;}
        .drop-zone { background: rgba(255,255,255,0.02); border-radius: 8px; min-height: 44px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); font-size: 0.85rem; font-weight: 600; padding: 4px; transition: all 0.2s; }
        .drop-zone.active-hover { background: rgba(229, 184, 105, 0.1); border-color: var(--gold-primary); }
        
        .tarkeeb-pool { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .draggable-role { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 16px; font-size: 0.9rem; font-weight: 600; color: var(--text-pure); cursor: grab; user-select: none; }
        .draggable-role:active { cursor: grabbing; }
        .draggable-role.assigned { opacity: 0.4; cursor: not-allowed; }

        .critique-panel { margin-top: 24px; padding: 22px; border-radius: 16px; font-size: 0.98rem; line-height: 1.6; display: none; }
        .critique-panel.node-correct { background: var(--emerald-glass); color: #a7f3d0; border-left: 4px solid var(--emerald-true); }
        .critique-panel.node-wrong { background: var(--rose-glass); color: #fecdd3; border-left: 4px solid var(--rose-true); }

        .submission-trigger {
            width: 100%; background: var(--gold-primary); color: #0b0c10; border: none; padding: 18px;
            border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 28px;
            box-shadow: 0 8px 24px rgba(229, 184, 105, 0.2); display: none; transition: all 0.2s ease;
        }
        .submission-trigger:hover { background: #f0c984; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="ambient-light-1"></div>

<div class="game-wrapper">
    <div class="dashboard-card">
        <div class="header-widget">
            <div class="rank-container">
                <span class="rank-label">Nahwi Mastery Level</span>
                <span class="rank-title" id="display-rank">Mubtadi' (Level 1)</span>
            </div>
            <div class="metric-badge">Quest Score: <span id="display-score">0</span></div>
        </div>

        <div class="tracker-timeline"><div class="tracker-fill" id="display-streak"></div></div>

        <div class="verse-viewport">
            <div class="arabic-display" id="viewport-arabic">...</div>
            <div class="translation-display" id="viewport-translation">...</div>
        </div>

        <div class="interactive-zone">
            <span class="category-tag" id="display-type">Nahw</span>
            <div class="question-statement" id="display-question">...</div>
            
            <div class="options-grid" id="viewport-options"></div>

            <div class="tarkeeb-board" id="viewport-tarkeeb" style="display: none;">
                <div class="tarkeeb-slots" id="tarkeeb-slots-container"></div>
                <div class="tarkeeb-pool" id="tarkeeb-labels-pool"></div>
            </div>

            <div class="critique-panel" id="viewport-critique"></div>
        </div>

        <button class="submission-trigger" id="action-trigger" onclick="advanceQuestRoute()">Advance Quest Tier →</button>
    </div>
</div>

<script>
    // System database implementing strict pedagogical standards of Nahw Mir and Hidayatun Nahw
    const linguisticsRepository = [
        {
            verse: "قُلْ هُوَ اللَّهُ أَحَدٌ",
            translation: '"Say, \'He is Allah, [who is] One.\'"',
            type: "nahw",
            question: "According to Hidayatun Nahw, what type of sentence construct is initiated inside the scope of the speech block (Meqool al-Qawl)?",
            options: [
                { text: "Jumlah Ismiyyah Khabariyyah, built from a starting core base pronoun (Dhamir al-Sha'n) acting as Mubtada'.", correct: true },
                { text: "Jumlah Fi'liyyah Inshaiyyah, driven wholly by implicit modification factors.", correct: false },
                { text: "Jumlah Shartiyyah, holding an omitted operational clause configuration.", correct: false }
            ],
            explanation: "As detailed in Hidayatun Nahw, 'هُوَ' functions as Dhamir al-Sha'n (the pronoun of matter/fact), occupying the position of Mubtada'. The following phrase forms its systemic Khabar, culminating as a Jumlah Ismiyyah Khabariyyah."
        },
        {
            verse: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
            translation: '"[All] praise is [due] to Allah, Lord of the worlds"',
            type: "nahw",
            question: "In Nahw Mir, how is the case inflection (I'rab) of the word 'الْحَمْدُ' classified?",
            options: [
                { text: "I'rab Lafzi (explicit voweled inflection) with a visible Dammah on a Ghayr-Munsarif structural base.", correct: false },
                { text: "I'rab Lafzi (explicit inflection) with a Dammah, classified under Ism Mu'rab Mufrad Munsarif Saheeh.", correct: true },
                { text: "I'rab Taqdiri (assumed/hidden inflection) due to phonetic weight processing requirements.", correct: false }
            ],
            explanation: "Nahw Mir dictates that a fully sound, singular, fully declinable noun (Mufrad Munsarif Saheeh) takes explicit textual vowels (I'rab Lafzi), showing a clear Dammah in its Raf' state."
        },
        {
            verse: "جَاءَ نَصْرُ اللَّهِ",
            translation: '"The victory of Allah has come"',
            type: "tarkeeb",
            question: "Construct the correct grammatical structural syntax tree (Tarkeeb) for this phrase:",
            words: [
                { word: "جَاءَ", correctRole: "Fi'l (Verb)" },
                { word: "نَصْرُ", correctRole: "Mudaf (Possessed)" },
                { word: "اللَّهِ", correctRole: "Mudaf Ilayh (Possessor)" }
            ],
            rolesPool: ["Fi'l (Verb)", "Mudaf (Possessed)", "Mudaf Ilayh (Possessor)", "Mubtada'", "Khabar"],
            explanation: "The composition is a Jumlah Fi'liyyah. 'جَاءَ' is the Fi'l. 'نَصْرُ' is Mudaf and 'اللَّهِ' is Mudaf Ilayh. Together, the Mudaf and Mudaf Ilayh form the Fa'il (Agent) for the preceding verb."
        },
        {
            verse: "بِسْمِ اللَّهِ",
            translation: '"In the name of Allah"',
            type: "tarkeeb",
            question: "Assemble the structural components to complete the Tarkeeb breakdown:",
            words: [
                { word: "بِ", correctRole: "Harf Jarr (Preposition)" },
                { word: "سْمِ", correctRole: "Mudaf" },
                { word: "اللَّهِ", correctRole: "Mudaf Ilayh" }
            ],
            rolesPool: ["Harf Jarr (Preposition)", "Mudaf", "Mudaf Ilayh", "Fa'il", "Sifah"],
            explanation: "'بِ' is the Harf Jarr. 'سْمِ' functions as Mudaf, compounding with the majestic name 'اللَّهِ' which acts as Mudaf Ilayh. The combined compound is bound down by the preceding genitive operator particle."
        }
    ];

    let tallyScore = 0;
    let streakMetric = 0;
    let tierLevel = 1;
    let contextEntity = null;
    let currentTarkeebState = {};
    let draggedElement = null;

    const rankGlossary = ["Mubtadi' (Beginner)", "Mutawassit (Intermediate)", "Mahir (Advanced)", "Nahwi Specialist"];

    function transformRankState() {
        tierLevel = Math.floor(tallyScore / 4) + 1;
        let indexSelector = Math.min(Math.floor((tierLevel - 1) / 2), rankGlossary.length - 1);
        document.getElementById('display-rank').textContent = `${rankGlossary[indexSelector]} (Lvl ${tierLevel})`;
    }

    function generateProceduralQuestion() {
        let referenceSeed = linguisticsRepository[Math.floor(Math.random() * linguisticsRepository.length)];
        
        if (referenceSeed.type !== "tarkeeb") {
            let optionsShuffled = referenceSeed.options.map(obj => ({...obj}));
            for (let i = optionsShuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsShuffled[i], optionsShuffled[j]] = [optionsShuffled[j], optionsShuffled[i]];
            }
            return { ...referenceSeed, options: optionsShuffled };
        }
        return referenceSeed;
    }

    function launchQuestCycle() {
        contextEntity = generateProceduralQuestion();
        
        document.getElementById('viewport-arabic').textContent = contextEntity.verse;
        document.getElementById('viewport-translation').textContent = contextEntity.translation;
        document.getElementById('display-question').textContent = contextEntity.question;
        
        const badgeElement = document.getElementById('display-type');
        badgeElement.textContent = contextEntity.type;
        badgeElement.className = `category-tag ${contextEntity.type}`;

        const optionsBox = document.getElementById('viewport-options');
        const tarkeebBoard = document.getElementById('viewport-tarkeeb');
        const reviewPanel = document.getElementById('viewport-critique');
        const actionBtn = document.getElementById('action-trigger');

        optionsBox.innerHTML = '';
        reviewPanel.style.display = 'none';
        actionBtn.style.display = 'none';
        currentTarkeebState = {};

        if (contextEntity.type !== "tarkeeb") {
            optionsBox.style.display = 'flex';
            tarkeebBoard.style.display = 'none';

            contextEntity.options.forEach((choiceItem) => {
                const blockNode = document.createElement('button');
                blockNode.className = 'option-node';
                blockNode.innerHTML = `<span>${choiceItem.text}</span>`;
                blockNode.onclick = () => verifyMCQAnswer(blockNode, choiceItem.correct);
                optionsBox.appendChild(blockNode);
            });
        } else {
            optionsBox.style.display = 'none';
            tarkeebBoard.style.display = 'flex';
            actionBtn.style.display = 'block';
            actionBtn.textContent = "Evaluate Tarkeeb Architecture";

            setupTarkeebWorkspace();
        }

        document.getElementById('display-score').textContent = tallyScore;
        document.getElementById('display-streak').style.width = `${(streakMetric / 5) * 100}%`;
        transformRankState();
    }

    function verifyMCQAnswer(elementNode, assessmentResult) {
        const structuralNodes = document.querySelectorAll('.option-node');
        structuralNodes.forEach(node => node.disabled = true);
        const reviewPanel = document.getElementById('viewport-critique');

        if (assessmentResult) {
            elementNode.classList.add('node-correct');
            reviewPanel.className = "critique-panel node-correct";
            reviewPanel.innerHTML = `<strong>Analysis Confirmed:</strong><br>${contextEntity.explanation}`;
            tallyScore++;
            streakMetric = Math.min(streakMetric + 1, 5);
        } else {
            elementNode.classList.add('node-wrong');
            reviewPanel.className = "critique-panel node-wrong";
            reviewPanel.innerHTML = `<strong>Adjustment Needed:</strong><br>${contextEntity.explanation}`;
            streakMetric = 0;
            contextEntity.options.forEach((item, idx) => {
                if (item.correct) structuralNodes[idx].classList.add('node-correct');
            });
        }

        reviewPanel.style.display = 'block';
        const actionBtn = document.getElementById('action-trigger');
        actionBtn.style.display = 'block';
        actionBtn.textContent = "Advance Quest Tier →";
    }

    function setupTarkeebWorkspace() {
        const slotsContainer = document.getElementById('tarkeeb-slots-container');
        const poolContainer = document.getElementById('tarkeeb-labels-pool');
        
        slotsContainer.innerHTML = '';
        poolContainer.innerHTML = '';

        contextEntity.words.forEach((item, index) => {
            const slotCard = document.createElement('div');
            slotCard.className = 'tarkeeb-slot-card';
            slotCard.innerHTML = `
                <span class="word-label">${item.word}</span>
                <div class="drop-zone" id="slot-${index}" data-index="${index}">Drop Role Here</div>
            `;
            slotsContainer.appendChild(slotCard);

            const zone = slotCard.querySelector('.drop-zone');
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('dragenter', () => zone.classList.add('active-hover'));
            zone.addEventListener('dragleave', () => zone.classList.remove('active-hover'));
            zone.addEventListener('drop', () => handleLabelDrop(zone, index));
        });

        contextEntity.rolesPool.forEach((role) => {
            const labelNode = document.createElement('div');
            labelNode.className = 'draggable-role';
            labelNode.textContent = role;
            labelNode.setAttribute('draggable', 'true');
            
            labelNode.addEventListener('dragstart', () => { draggedElement = labelNode; });
            poolContainer.appendChild(labelNode);
        });
    }

    function handleLabelDrop(zoneElement, index) {
        zoneElement.classList.remove('active-hover');
        if (!draggedElement) return;

        zoneElement.textContent = draggedElement.textContent;
        zoneElement.style.color = '#ffffff';
        currentTarkeebState[index] = draggedElement.textContent;
    }

    function evaluateTarkeebSubmission() {
        let isPerfect = true;
        contextEntity.words.forEach((item, index) => {
            const zone = document.getElementById(`slot-${index}`);
            if (currentTarkeebState[index] === item.correctRole) {
                zone.style.background = "rgba(16, 185, 129, 0.2)";
                zone.style.borderColor = "var(--emerald-true)";
            } else {
                zone.style.background = "rgba(244, 63, 94, 0.2)";
                zone.style.borderColor = "var(--rose-true)";
                isPerfect = false;
            }
        });

        const reviewPanel = document.getElementById('viewport-critique');
        if (isPerfect) {
            reviewPanel.className = "critique-panel node-correct";
            reviewPanel.innerHTML = `<strong>Tarkeeb Confirmed!</strong><br>${contextEntity.explanation}`;
            tallyScore += 2;
            streakMetric = Math.min(streakMetric + 1, 5);
        } else {
            reviewPanel.className = "critique-panel node-wrong";
            reviewPanel.innerHTML = `<strong>Structural Error Identified:</strong> Review the case assignments below.<br>${contextEntity.explanation}`;
            streakMetric = 0;
        }

        reviewPanel.style.display = 'block';
        const actionBtn = document.getElementById('action-trigger');
        actionBtn.textContent = "Advance Quest Tier →";
    }

    function advanceQuestRoute() {
        const actionBtn = document.getElementById('action-trigger');
        if (contextEntity.type === "tarkeeb" && actionBtn.textContent.includes("Evaluate")) {
            evaluateTarkeebSubmission();
        } else {
            launchQuestCycle();
        }
    }

    launchQuestCycle();
</script>
</body>
</html>
